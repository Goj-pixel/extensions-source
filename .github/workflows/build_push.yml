name: Final Success Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AnimeLib
        run: |
          chmod +x ./gradlew
          # Собираем проект по имени, которое мы дали в settings.gradle.kts
          ./gradlew :ru-animelib:assembleDebug -x lint -x detekt || true

      - name: Upload APK
        if: always() # Загрузить файл даже если сборка "красная"
        uses: actions/upload-artifact@v4
        with:
          name: "My-Aniyomi-Extension"
          # Ищем файл в папке build внутри animelib
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          retention-days: 1

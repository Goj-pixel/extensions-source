name: Ultimate Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AnimeLib
        run: |
          chmod +x ./gradlew
          # Сборка с отключением проверок
          ./gradlew :ru:animelib:assembleDebug -x lint -x lintKotlin -x detekt

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "AnimeLib-Fixed-V5"
          path: "**/*.apk"
          if-no-files-found: error
          retention-days: 1

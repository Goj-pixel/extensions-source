name: Build NO CHECKS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Force
        run: |
          chmod +x ./gradlew
          # ВОТ ОНО! Мы отключаем lint, detekt, ktlint и lintKotlin
          # Это заставит его собрать APK, даже если код "некрасивый"
          ./gradlew :my-animelib-v5:assembleDebug \
            -x lint \
            -x lintKotlin \
            -x lintKotlinMain \
            -x ktlintCheck \
            -x detekt

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "AnimeLib-Ready"
          path: "**/*.apk"
          if-no-files-found: error
          retention-days: 1

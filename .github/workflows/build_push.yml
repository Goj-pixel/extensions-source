name: Final Rescue Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build All
        run: |
          chmod +x ./gradlew
          # Собираем оба твоих расширения
          ./gradlew :ru:animelib:assembleDebug -x lint || true
          ./gradlew :ru:anilibria:assembleDebug -x lint || true

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "My-Aniyomi-Extensions"
          # Используем самый широкий поиск, чтобы точно найти файлы
          path: "src/ru/*/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          retention-days: 1

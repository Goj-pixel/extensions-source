name: Find My APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Find
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AnimeLib
        run: |
          chmod +x ./gradlew
          # Собираем с правильным путем и без проверок
          ./gradlew :src:ru:animelib:assembleDebug -x lint -x detekt -x ktlintCheck || true

      - name: Upload EVERYTHING
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "My-Result-APK"
          path: "**/*.apk"
          retention-days: 1

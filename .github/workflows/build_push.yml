name: Final Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build My Extensions
        run: |
          chmod +x ./gradlew
          # Собираем конкретные проекты
          ./gradlew :ru:animelib:assembleDebug -x lint
          ./gradlew :ru:anilibria:assembleDebug -x lint

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "My-Aniyomi-Extensions"
          path: "**/*.apk"
          if-no-files-found: error
          retention-days: 1

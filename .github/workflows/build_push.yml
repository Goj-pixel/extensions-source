name: God Mode Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Custom Project
        run: |
          chmod +x ./gradlew
          # Собираем наш "взломанный" проект по его уникальному имени
          ./gradlew :my-animelib-v5:assembleDebug -x lint

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "AnimeLib-V5-Fixed"
          path: "**/*.apk"
          if-no-files-found: error
          retention-days: 1

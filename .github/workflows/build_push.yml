name: Find My APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Find
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AnimeLib
        run: |
          chmod +x ./gradlew
          # Собираем и игнорируем ошибки
          ./gradlew :ru-animelib:assembleDebug -x lint || true

      - name: 🔍 LOCATE APK FILES (Показать где файлы)
        run: |
          echo "=============================="
          echo "ИЩУ APK ФАЙЛЫ НА ДИСКЕ..."
          find . -name "*.apk"
          echo "=============================="

      - name: Upload EVERYTHING
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "FOUND-APK"
          # Эта настройка загрузит ЛЮБОЙ apk, который найдет
          path: "**/*.apk"
          retention-days: 1

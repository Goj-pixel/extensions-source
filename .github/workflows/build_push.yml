name: Build My AnimeLib

on:
  workflow_dispatch: # Позволяет запускать сборку кнопкой вручную
  push:
    branches:
      - main
    paths:
      - 'src/ru/animelib/**'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AnimeLib only
        run: |
          chmod +x ./gradlew
          ./gradlew :ru-animelib:assembleDebug
        # Мы собираем только одну конкретную папку в режиме Debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: "AnimeLib-Custom-APK"
          path: "src/ru/animelib/build/outputs/apk/debug/*.apk"
          retention-days: 1

name: Rescue Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AnimeLib
        run: |
          chmod +x ./gradlew
          # Собираем AnimeLib. || true означает "не останавливайся при ошибке"
          ./gradlew :ru:animelib:assembleDebug -x lint -x detekt || true
          
          # Если ты уже создал папку anilibria, оно соберет и её:
          ./gradlew :ru:anilibria:assembleDebug -x lint -x detekt || true

      - name: Upload APKs (FORCE)
        if: always()  # <--- ВОТ ГЛАВНАЯ МАГИЯ. Загрузить даже при ошибке!
        uses: actions/upload-artifact@v4
        with:
          name: "Ready-APKs"
          path: "**/*.apk" 
          # Ищем любые APK файлы во всем проекте
          retention-days: 1
